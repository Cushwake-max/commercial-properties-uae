<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cushman &amp; Wakefield Core | Commercial Properties in the UAE</title>
    <meta name="description" content="Commercial property listings and leasing opportunities in the UAE, marketed by Cushman & Wakefield Core.">
    <meta name="robots" content="noindex">
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #1A1A1A;
            color: #fff;
            padding: 24px;
        }
        .wrap { max-width: 560px; text-align: center; }
        .kicker {
            text-transform: uppercase;
            letter-spacing: .18em;
            font-size: 12px;
            font-weight: 700;
            color: #E30613;
            margin: 0 0 14px;
        }
        h1 { font-size: clamp(28px, 5vw, 44px); line-height: 1.1; margin: 0 0 16px; }
        p { color: #b8b8b8; line-height: 1.6; margin: 0 0 28px; }
        .links { display: grid; gap: 12px; }
        a.cta {
            display: block;
            padding: 16px 26px;
            background: #fff;
            color: #1A1A1A;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: .02em;
        }
        a.cta:hover { background: #E30613; color: #fff; }
    </style>
</head>

<body>
    <div class="wrap">
        <p class="kicker">Cushman &amp; Wakefield Core</p>
        <h1>Commercial Properties in the UAE</h1>

            <a class="cta" href="/sweidone/">Sweid One &mdash; Fitted Offices, JLT &rarr;</a>

    </div>

</html>
